user  nginx;
worker_processes  auto;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout  65;

  upstream api {
    server api:3000;
  }

  upstream fe {
    server frontend:80;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://fe;
    }

    location /api/ {
      proxy_pass http://api;
    }
  }
}
